name: Reusable - Build and Push Image

on:
  workflow_call:
    inputs:
      service_name:
        description: "Name of the service (e.g. logistics-pickup)"
        required: true
        type: string
      environment:
        description: "Target environment: dev or prod"
        required: true
        type: string
      branch:
        description: "Branch that triggered the build"
        required: true
        type: string
      sha:
        description: "Git SHA of the commit"
        required: true
        type: string

    outputs:
      image_tag:
        description: "The Docker image tag that was built"
        value: ${{ jobs.build.outputs.image_tag }}

    secrets:
      DOCKERHUB_USERNAME:
      DOCKERHUB_TOKEN:
      HELM_REPO_TOKEN:

jobs:
  build:
    name: Build & Push - ${{ inputs.service_name }}
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout caller repo (service code)
        uses: actions/checkout@v4
        with:
          repository: your-org/${{ inputs.service_name }}
          token: ${{ secrets.DOCKERHUB_TOKEN }}
          ref: ${{ inputs.branch }}

      - name: Set image tag
        id: meta
        run: |
          SHORT_SHA=$(echo ${{ inputs.sha }} | cut -c1-7)
          TAG="${{ inputs.environment }}-${SHORT_SHA}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Built tag: ${TAG}"

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.service_name }}:${{ steps.meta.outputs.tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.service_name }}:${{ inputs.environment }}-latest
