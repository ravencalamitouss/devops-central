name: Reusable - Lint, Test & Security Scan

on:
  workflow_call:
    inputs:
      service_name:
        description: "Name of the service"
        required: true
        type: string

jobs:
  lint-test:
    name: Lint + Test + Security
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint (eslint)
        run: npm run lint

      - name: Unit Tests (jest)
        run: npm test

      - name: Secret Scan
        run: |
          wget -q https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz
          tar -xzf gitleaks_8.18.4_linux_x64.tar.gz
          chmod +x gitleaks

          ./gitleaks detect \
            --source . \
            --no-git \
            --no-banner \
            -v \
            --exclude-path node_modules

      - name: Dependency Scan (npm audit)
        run: npm audit --audit-level=high
